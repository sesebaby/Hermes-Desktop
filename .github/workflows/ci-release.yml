# Portable-zip release pipeline
# ─────────────────────────────
# Triggers on version tags (v*).  Builds the portable zip on a Windows runner,
# then creates (or updates) a GitHub Release with the zip attached.
#
# HOW TO CUT A RELEASE
# ────────────────────
#   1.  Merge your changes to main.
#   2.  Tag the merge commit and push the tag:
#         git tag -a v2.3.1 -m "v2.3.1 — short description"
#         git push origin v2.3.1
#   3.  This workflow runs automatically.  When it finishes (~5 min):
#       • A GitHub Release named "v2.3.1" exists with auto-generated notes.
#       • HermesDesktop-portable-x64.zip is attached as a release asset.
#       • The README "Download" link (pointing at /releases/latest) resolves
#         to the new release.
#   4.  (Optional) Edit the release on GitHub to polish the description.
#
# WHAT IF THE BUILD FAILS?
#   • The release is NOT created — nothing is published to users.
#   • Fix the issue on main, delete the broken tag, re-tag, and push:
#       git tag -d v2.3.1
#       git push origin :refs/tags/v2.3.1
#       git tag -a v2.3.1 -m "v2.3.1 — short description"
#       git push origin v2.3.1
#
# MANUAL RELEASE (without this workflow)
#   On your Windows machine:
#     powershell -ExecutionPolicy Bypass -File .\scripts\publish-portable.ps1 -Zip
#   Then upload Desktop\HermesDesktop\bin\HermesDesktop-portable-x64.zip
#   to the GitHub Release page manually.

name: Release — Portable Zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write          # needed to create releases and upload assets

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Prepare isolated smoke environment
        shell: pwsh
        run: |
          $smokeHome = Join-Path $env:RUNNER_TEMP "hermes-smoke-home"
          if (Test-Path $smokeHome) {
            Remove-Item -Path $smokeHome -Recurse -Force
          }
          New-Item -ItemType Directory -Path $smokeHome | Out-Null

          $startupLog = Join-Path $smokeHome "hermes-cs\logs\desktop-startup.log"
          $probeReport = Join-Path $env:RUNNER_TEMP "hermes-release-smoke-probe-report.txt"

          "HERMES_HOME=$smokeHome" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HERMES_SMOKE_STARTUP_LOG=$startupLog" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "HERMES_SMOKE_PROBE_REPORT=$probeReport" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build + publish portable zip
        shell: pwsh
        run: |
          .\scripts\publish-portable.ps1 -Zip

      - name: Build smoke probe helper
        shell: pwsh
        run: dotnet build .\tools\Hermes.SmokeProbe\Hermes.SmokeProbe.csproj -c Release

      - name: Launch and probe Hermes portable startup
        shell: pwsh
        run: |
          $portableExe = Join-Path $PWD "Desktop\HermesDesktop\bin\publish-portable\HermesDesktop.exe"
          if (-not (Test-Path $portableExe)) {
            throw "Portable executable missing at $portableExe"
          }

          dotnet run --project .\tools\Hermes.SmokeProbe\Hermes.SmokeProbe.csproj -c Release -- `
            --exe "$portableExe" `
            --startup-log "$env:HERMES_SMOKE_STARTUP_LOG" `
            --report-path "$env:HERMES_SMOKE_PROBE_REPORT" `
            --startup-timeout-seconds 90 `
            --settle-seconds 8 `
            --fatal-pattern "Fatal startup error" `
            --fatal-pattern "constructor failed" `
            --fatal-pattern "Cannot create instance of type ReplayPanel" `
            --fatal-pattern "XamlParseException"

      - name: Upload release smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-portable-smoke-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ${{ env.HERMES_SMOKE_PROBE_REPORT }}
            ${{ env.HERMES_SMOKE_STARTUP_LOG }}
            Desktop/HermesDesktop/bin/HermesDesktop-portable-x64.zip

      - name: Create GitHub Release with zip attached
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: Desktop/HermesDesktop/bin/HermesDesktop-portable-x64.zip
