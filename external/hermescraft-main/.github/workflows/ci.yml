name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Install bot dependencies
        run: npm ci
        working-directory: bot

      - name: Run bot unit tests
        run: npm test
        working-directory: bot

      - name: Check Node syntax
        run: node --check bot/server.js

      - name: Check shell syntax
        run: |
          bash -n civilization.sh
          bash -n hermescraft.sh
          bash -n setup.sh
          bash -n server/start.sh
